<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Minesweeper</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Inline critical fix to prevent double-tap zoom on all game elements */
      * {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        /* Prevents the 'pull-to-refresh' gesture which can interrupt gameplay */
        overscroll-behavior-y: contain;
        /* Prevents text selection when tapping rapidly */
        user-select: none;
        -webkit-user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="status-bar">
        <div class="stat">🚩 <span id="flag-count">10</span></div>
        <div class="stat">⏱️ <span id="timer">000</span></div>
      </div>
      <div id="board"></div>
    </div>

    <div id="overlay" class="overlay-hidden">
      <div id="popup">
        <h1 id="result-title">GAME OVER</h1>
        <div class="summary-stats">
          <p>Time spent: <span id="final-time">0</span>s</p>
          <p>Flagged mines: <span id="final-flagged">0</span></p>
          <p>Unflagged mines: <span id="final-unflagged">0</span></p>
        </div>
        <div class="popup-buttons">
          <button id="btn-play-again">Play Again</button>
          <button id="btn-view-round">View Round</button>
        </div>
      </div>
    </div>

    <div id="view-round-controls" class="controls-hidden">
      <button id="btn-play-again-alt">Play Again</button>
      <button id="btn-view-summary">View Summary</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
