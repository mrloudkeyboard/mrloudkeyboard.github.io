<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic | Login</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="stars"></div>
    <div class="twinkling"></div>

    <div class="container">
      <div class="auth-card" id="auth-card">
        <h2 id="form-title">Login</h2>
        <p id="error-message" class="error-text"></p>

        <form id="auth-form">
          <div id="signup-fields" class="animated-field" style="display: none">
            <input type="text" id="username" placeholder="Username" />
          </div>

          <input
            type="text"
            id="main-input"
            placeholder="Email or Username"
            required
          />
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />

          <div id="confirm-group" class="animated-field" style="display: none">
            <input
              type="password"
              id="confirm-password"
              placeholder="Confirm Password"
            />
          </div>

          <button type="submit" id="submit-btn" class="main-btn">Login</button>
        </form>

        <div class="separator"><span>OR</span></div>

        <button type="button" id="google-btn" class="google-btn">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path
              d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.91c1.7-1.56 2.69-3.86 2.69-6.62z"
              fill="#4285F4"
            />
            <path
              d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.8.54-1.83.85-3.05.85-2.34 0-4.32-1.58-5.03-3.71H1.04v2.33C2.52 15.86 5.54 18 9 18z"
              fill="#34A853"
            />
            <path
              d="M3.97 10.7a5.41 5.41 0 0 1 0-3.4V4.97H1.04a8.99 8.99 0 0 0 0 8.06l2.93-2.33z"
              fill="#FBBC05"
            />
            <path
              d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.54 0 2.52 2.14 1.04 5.13l2.93 2.33c.71-2.13 2.69-3.71 5.03-3.71z"
              fill="#EA4335"
            />
          </svg>
          Continue with Google
        </button>

        <p class="toggle-text">
          New User? <span id="toggle-auth">Create Account</span>
        </p>
      </div>
    </div>

    <div id="verify-modal" class="modal-overlay">
      <div class="modal-content">
        <span class="close-modal" id="close-modal">&times;</span>
        <h3>Verification Link</h3>
        <hr class="modal-divider" />
        <p>
          Check your email <b id="user-email-display"></b> and click the link to
          login.
        </p>
        <p class="spam-note">Don't see an email? Check spam/trash folder or</p>
        <button id="resend-btn" class="resend-link">Resend Code (30s)</button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
