<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Access - Refined</title>
    <style>
        :root {
            --primary: #a29bfe;
            --accent: #6c5ce7;
            --glass: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --input-bg: rgba(0, 0, 0, 0.3);
            --modal-bg: rgba(10, 10, 25, 0.98);
            --error: #ff7675;
            --success: #00b894;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body, html {
            height: 100%; overflow: hidden;
            background: linear-gradient(-45deg, #020111, #050531, #191970, #000000);
            background-size: 400% 400%; animation: gradientBG 20s ease infinite;
            color: var(--text);
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #loader { position: fixed; inset: 0; background: #020111; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.8s ease; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .container { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; perspective: 1500px; transition: filter 0.5s ease; }
        .container.blurred { filter: blur(20px); pointer-events: none; }

        .card { position: relative; width: 360px; height: 460px; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), height 0.6s ease; transform-style: preserve-3d; }
        .card.flipped { transform: rotateY(180deg); height: 600px; }
        .face { position: absolute; inset: 0; backface-visibility: hidden; background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); display: flex; flex-direction: column; overflow: hidden; }
        .card-back { transform: rotateY(180deg); }
        .scroll-wrapper { flex: 1; overflow-y: auto; padding: 2.5rem 2rem; display: flex; flex-direction: column; justify-content: center; scrollbar-width: none; }
        
        h2, h3 { font-weight: 500; letter-spacing: 1px; text-align: center; }
        .divider { height: 1px; width: 100%; background: rgba(255,255,255,0.2); margin: 1.2rem 0; }

        .or-separator {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            font-size: 0.8rem;
            opacity: 0.4;
            color: var(--text);
            flex-shrink: 0;
        }
        .or-separator::before, .or-separator::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.4);
        }
        /* Applied the "----------- OR ------------" style requested in history */
        .or-separator:not(:empty)::before { margin-right: 1rem; content: "-----------"; }
        .or-separator:not(:empty)::after { margin-left: 1rem; content: "-----------"; }

        input {
            width: 100%; padding: 14px; margin: 8px 0; background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white;
            outline: none; transition: 0.3s; flex-shrink: 0;
        }
        input:focus { border-color: var(--primary); }

        .google-btn-wrapper { position: relative; width: 100%; height: 48px; margin-top: 10px; flex-shrink: 0; }
        .connecting-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; color: var(--primary); font-weight: 600; animation: pulse 1.5s infinite; pointer-events: none; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }

        .google-btn { 
            position: absolute; inset: 0; width: 100%; height: 100%; background: white; color: #333; 
            border-radius: 10px; border: none; font-weight: 600; display: flex; 
            align-items: center; justify-content: center; gap: 10px; cursor: pointer; 
            opacity: 0; transform: scale(0.95); pointer-events: none; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
        }
        .google-btn.visible { opacity: 1; transform: scale(1); pointer-events: auto; }

        .btn-row { display: flex; gap: 10px; margin-top: 1.5rem; flex-shrink: 0;}
        button.main-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; flex-shrink: 0; }
        button.main-btn:hover:not(:disabled) { background: var(--primary); transform: translateY(-2px); }
        button.main-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #modalOverlay { position: fixed; inset: 0; z-index: 100; display: none; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .modal { width: 400px; background: var(--modal-bg); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 2.5rem; position: relative; }
        
        .close-modal {
            position: absolute; top: 20px; right: 20px; width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.05); border-radius: 50%;
            cursor: pointer; transition: 0.3s; z-index: 110; border: 1px solid rgba(255,255,255,0.1);
        }
        .close-modal:hover { background: var(--error); transform: rotate(90deg); }

        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .err-hint { color: var(--error); font-size: 0.75rem; display: none; margin-top: -4px; margin-bottom: 8px; font-weight: 500; }
        .req-list { list-style: none; margin-bottom: 10px; }
        .req-list li { font-size: 0.7rem; color: rgba(255,255,255,0.4); }
        .req-list li.pass { color: var(--success); }
        .req-list li.fail { color: var(--error); }

        .small-link { font-size: 0.75rem; color: rgba(255,255,255,0.4); cursor: pointer; text-decoration: underline; background: none; border: none; margin: 10px 0; }
        .label-text { font-size: 0.85rem; color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>
    <canvas id="canvas"></canvas>

    <div class="container" id="uiWrapper">
        <div class="card" id="mainCard">
            <div class="face card-front">
                <div class="scroll-wrapper">
                    <h2>LOGIN</h2>
                    <div class="divider"></div>
                    <input type="email" id="loginUser" placeholder="Email">
                    <input type="password" id="loginPass" placeholder="Password">
                    <p id="loginErr" class="err-hint" style="text-align: center;"></p>
                    <button class="main-btn" id="loginBtnAction">LOGIN</button>
                    
                    <div class="or-separator">OR</div>

                    <div class="google-btn-wrapper">
                        <div class="connecting-text">Connecting...</div>
                        <button class="google-btn googleAuthBtn">
                            <svg style="width:18px" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            Continue with Google
                        </button>
                    </div>
                    <button class="small-link" style="width:100%" onclick="toggleFlip()">Don't have an account? Sign Up</button>
                </div>
            </div>

            <div class="face card-back">
                <div class="scroll-wrapper">
                    <h2>SIGN UP</h2>
                    <div class="divider"></div>
                    <input type="email" id="rawEmail" placeholder="Email">
                    <input type="text" id="rawUser" placeholder="Username">
                    <input type="password" id="rawPass" placeholder="Password">
                    <button class="main-btn" onclick="openCreateAccount(document.getElementById('rawEmail').value)">SIGN UP</button>
                    
                    <div class="or-separator">OR</div>

                    <div class="google-btn-wrapper">
                        <div class="connecting-text">Connecting...</div>
                        <button class="google-btn googleAuthBtn">
                            <svg style="width:18px" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            Continue with Google
                        </button>
                    </div>
                    <button class="small-link" style="width:100%" onclick="toggleFlip()">Already have an account? Login</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay">
        <div class="modal">
            <div class="close-modal" onclick="closeModal()">
                <svg viewBox="0 0 24 24" width="14" fill="white"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </div>
            <h3>Create Account</h3>
            <div class="divider"></div>
            <div id="modalLoader" class="spinner" style="width: 30px; height: 30px; margin: 20px auto; display: none;"></div>
            
            <div id="modalBody">
                <div class="step-content active" id="step1">
                    <span class="label-text">Email:</span>
                    <input type="email" id="signupEmail" disabled>
                    <button class="small-link" onclick="unlockEmail()">Change Email</button>
                </div>

                <div class="step-content" id="step2">
                    <span class="label-text">Choose Username:</span>
                    <input type="text" id="signupUser" placeholder="Username" maxlength="16">
                </div>

                <div class="step-content" id="step3">
                    <span class="label-text">Create Password:</span>
                    <input type="password" id="signupPass" placeholder="••••••••">
                    <ul class="req-list">
                        <li id="req-len">• Minimum 8 characters</li>
                        <li id="req-cap">• Capital letter</li>
                        <li id="req-spec">• Special character</li>
                    </ul>
                </div>

                <div class="step-content" id="step4">
                    <span class="label-text">Repeat Password:</span>
                    <input type="password" id="signupRepeat" placeholder="••••••••">
                    <p id="repeatErr" class="err-hint">Passwords do not match</p>
                </div>

                <div class="step-content" id="step5">
                    <p style="text-align: center;">Verification sent to <br><strong id="displayEmail"></strong></p>
                    <p id="otpErr" class="err-hint" style="text-align:center; margin-top: 10px;">Email not verified yet. Check your inbox!</p>
                    <button class="small-link" id="resendBtn" style="display:block; margin: 15px auto;"></button>
                </div>

                <div class="btn-row">
                    <button class="main-btn" id="backBtn" onclick="prevStep()" disabled style="background: rgba(255,255,255,0.1);">Back</button>
                    <button class="main-btn" id="nextBtn" onclick="nextStep()">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            GoogleAuthProvider, signInWithPopup, sendEmailVerification, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDo51L0SkPnJYHX7cmbAUHiZSE-IDmcrW0",
            authDomain: "cosmic--hub.firebaseapp.com",
            projectId: "cosmic--hub",
            storageBucket: "cosmic--hub.firebasestorage.app",
            messagingSenderId: "233637061281",
            appId: "1:233637061281:web:01da50ef16473fb62586e0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentStep = 1;
        let timerVal = 30;
        let countdown;

        // 1. Initial Load Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 600);
            }, 1000);
            triggerGoogleReveal();
        });

        // 2. Google Reveal Animation
        function triggerGoogleReveal() {
            const btns = document.querySelectorAll('.google-btn');
            btns.forEach(b => b.classList.remove('visible'));
            setTimeout(() => btns.forEach(b => b.classList.add('visible')), 1500);
        }

        // 3. Auth State (NO AUTO REDIRECT FOR EMAIL USERS)
        onAuthStateChanged(auth, (user) => {
            // We only auto-redirect if they are ALREADY verified and just refreshed the page
            // Or if they just logged in via Google (which is verified by default)
            if (user && user.emailVerified && currentStep !== 5) {
                window.location.href = "https://mrloudkeyboard.github.io/dashboard";
            }
        });

        // 4. Manual Login
        document.getElementById('loginBtnAction').addEventListener('click', async () => {
            const email = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                if(res.user.emailVerified) {
                    window.location.href = "https://mrloudkeyboard.github.io/dashboard";
                } else {
                    document.getElementById('loginErr').innerText = "Verify your email first.";
                    document.getElementById('loginErr').style.display = "block";
                }
            } catch (e) { document.getElementById('loginErr').style.display = "block"; document.getElementById('loginErr').innerText = "Invalid Login"; }
        });

        // 5. Google Login (Instant Redirect because Google is trusted)
        document.querySelectorAll('.googleAuthBtn').forEach(btn => {
            btn.addEventListener('click', async () => {
                try {
                    await signInWithPopup(auth, provider);
                    window.location.href = "https://mrloudkeyboard.github.io/dashboard";
                } catch (e) { console.error(e); }
            });
        });

        // 6. Multi-Step Modal Logic
        window.nextStep = async () => {
            if (!validateCurrentStep()) return;

            if (currentStep === 4) {
                const email = document.getElementById('signupEmail').value;
                const pass = document.getElementById('signupPass').value;
                showStepLoading(async () => {
                    try {
                        const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                        await sendEmailVerification(userCred.user);
                        currentStep = 5;
                        setStep(5);
                        startCountdown();
                    } catch (e) { alert(e.message); closeModal(); }
                });
                return;
            }

            // STEP 5: MANUAL CHECK (NO AUTO REDIRECT)
            if (currentStep === 5) {
                await auth.currentUser.reload();
                if (auth.currentUser.emailVerified) {
                    window.location.href = "https://mrloudkeyboard.github.io/dashboard";
                } else {
                    document.getElementById('otpErr').style.display = 'block';
                }
                return;
            }

            showStepLoading(() => { currentStep++; setStep(currentStep); });
        };

        window.toggleFlip = () => { 
            document.getElementById('mainCard').classList.toggle('flipped'); 
            triggerGoogleReveal();
        };

        function setStep(step) {
            document.querySelectorAll('.step-content').forEach((el, i) => el.classList.toggle('active', (i + 1) === step));
            document.getElementById('backBtn').disabled = (step === 1 || step === 5);
            document.getElementById('nextBtn').innerText = (step === 5) ? "I've Verified" : "Next";
        }

        function validateCurrentStep() {
            if(currentStep === 3) {
                const v = document.getElementById('signupPass').value;
                const ok = v.length >= 8 && /[A-Z]/.test(v) && /[!@#$%^&*]/.test(v);
                document.getElementById('req-len').className = v.length >= 8 ? 'pass' : 'fail';
                document.getElementById('req-cap').className = /[A-Z]/.test(v) ? 'pass' : 'fail';
                document.getElementById('req-spec').className = /[!@#$%^&*]/.test(v) ? 'pass' : 'fail';
                return ok;
            }
            if(currentStep === 4) return document.getElementById('signupRepeat').value === document.getElementById('signupPass').value;
            return true;
        }

        function startCountdown() {
            timerVal = 30;
            const btn = document.getElementById('resendBtn');
            clearInterval(countdown);
            countdown = setInterval(() => {
                timerVal--;
                btn.innerText = `Resend link in ${timerVal}s`;
                btn.disabled = true;
                if(timerVal <= 0) {
                    clearInterval(countdown);
                    btn.innerText = "Resend Verification Email";
                    btn.disabled = false;
                    btn.onclick = () => { sendEmailVerification(auth.currentUser); startCountdown(); };
                }
            }, 1000);
        }

        window.openCreateAccount = (e) => {
            document.getElementById('signupEmail').value = e;
            document.getElementById('displayEmail').innerText = e;
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('uiWrapper').classList.add('blurred');
            setStep(1);
        };

        window.closeModal = () => {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('uiWrapper').classList.remove('blurred');
        };

        window.unlockEmail = () => { document.getElementById('signupEmail').disabled = false; };
        window.prevStep = () => { if(currentStep > 1) { currentStep--; setStep(currentStep); } };
        function showStepLoading(cb) { 
            document.getElementById('modalBody').style.display = 'none'; 
            document.getElementById('modalLoader').style.display = 'block';
            setTimeout(() => { document.getElementById('modalLoader').style.display = 'none'; document.getElementById('modalBody').style.display = 'block'; cb(); }, 500);
        }

        // Starfield
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        class Star {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*1.5; this.v = Math.random()*0.5; }
            draw() { ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill(); }
            update() { this.y += this.v; if(this.y > canvas.height) this.y = 0; }
        }
        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; stars = []; for(let i=0; i<400; i++) stars.push(new Star()); }
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s=>{s.update();s.draw();}); requestAnimationFrame(anim); }
        init(); anim(); window.addEventListener('resize', init);
    </script>
</body>
</html>
