<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minesweeper Elite</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #0ea5e9;
            --mine: #ef4444;
            --flag: #f59e0b;
            --correct: #10b981;
            --wrong: #7f1d1d;
            --text: #f8fafc;
            --tile: #334155;
            --tile-rev: #1e293b;
            --tile-hover: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; user-select: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .overlay {
            position: fixed; inset: 0; display: none; align-items: center;
            justify-content: center; z-index: 3000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay.active { display: flex; opacity: 1; }

        .modal {
            background: rgba(30, 41, 59, 0.9);
            width: 90%; max-width: 380px; padding: 30px; border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .overlay.active .modal { transform: scale(1); }

        .game-wrapper { 
            width: 95vw; max-width: 420px; display: flex; flex-direction: column; gap: 12px;
            position: relative;
        }
        
        #grid {
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            grid-template-rows: repeat(10, 1fr);
            gap: 4px;
            width: 100%; 
            aspect-ratio: 1/1; 
            padding: 8px; 
            border-radius: 12px;
            background: var(--card);
            position: relative;
        }

        .tile {
            width: 100%; height: 100%;
            background: var(--tile); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; cursor: pointer; transition: background 0.1s;
            font-size: 1.1rem;
            will-change: transform;
        }

        .tile:hover:not(.revealed) { background: var(--tile-hover); }
        .tile.revealed { background: var(--tile-rev); } 
        
        .tile.flagged::after { content: '🚩'; font-size: 0.9rem; }
        .tile.mine-reveal { background: var(--mine); animation: pop 0.4s ease; }

        @keyframes pop { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Mobile Action Menu */
        #mobile-menu {
            position: fixed;
            display: none;
            flex-direction: row;
            gap: 10px;
            z-index: 2000;
            background: #f8fafc;
            padding: 6px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            pointer-events: auto;
            transform: translate(-50%, -110%);
        }

        .mob-btn {
            width: 44px; height: 44px;
            border-radius: 50%; border: none;
            font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s;
        }

        /* UI Styling */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .stat-badge { background: #0f172a; padding: 8px 12px; border-radius: 10px; min-width: 70px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stats-btn {
            background: #1e293b; border: 1px solid var(--accent); color: var(--accent);
            padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; cursor: pointer;
        }
        .btn { padding: 12px 24px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #475569; color: white; }

        #viewing-controls { display: none; gap: 10px; justify-content: center; margin-top: 15px; width: 100%; }
        .stat-row { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .n1 { color: #38bdf8; } .n2 { color: #4ade80; } .n3 { color: #fb7185; } .n4 { color: #818cf8; }
        
        .legend-pc { font-size: 0.7rem; color: #64748b; text-align: center; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="header">
            <div class="stat-badge">🚩 <span id="flag-count">15</span></div>
            <button class="stats-btn" onclick="openModal('stats-overlay')">📊 STATS</button>
            <div class="stat-badge">⏱️ <span id="timer-val">0</span></div>
        </div>
        
        <div id="grid"></div>
        <div id="pc-legend" class="legend-pc">L-Click: Dig/Chord | R-Click: Flag</div>

        <div id="viewing-controls">
            <button class="btn btn-secondary" onclick="openModal('summary-overlay')">SUMMARY</button>
            <button class="btn btn-primary" onclick="initGame()">NEW GAME</button>
        </div>
    </div>

    <div class="overlay" id="summary-overlay">
        <div class="modal">
            <h1 id="res-title">GAME OVER</h1>
            <div id="res-details" style="margin: 20px 0;"></div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn btn-primary" onclick="initGame()">PLAY AGAIN</button>
                <button class="btn btn-secondary" onclick="viewRound()">VIEW ROUND</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="stats-overlay">
        <div class="modal">
            <h2 style="margin-bottom: 20px;">Lifetime Stats</h2>
            <div id="lifetime-details"></div>
            <button class="btn btn-primary" style="margin-top:20px; width:100%" onclick="closeModal('stats-overlay')">CLOSE</button>
        </div>
    </div>

    <div id="mobile-menu">
        <button class="mob-btn" style="background:#e2e8f0" onclick="handleAction('dig')">⛏️</button>
        <button class="mob-btn" style="background:#fef3c7" onclick="handleAction('flag')">🚩</button>
        <button class="mob-btn" style="background:#dcfce7; display:none" id="chord-btn" onclick="handleAction('chord')">🔄</button>
    </div>

<script>
    const SIZE = 10, MINE_COUNT = 15;
    let mines = [], flags = new Set(), revealed = new Set();
    let gameOver = false, time = 0, timerInt, activeTileIdx = null, firstClick = true;

    let stats = JSON.parse(localStorage.getItem('ms_ultimate_stats')) || {
        best: 999, wins: 0, loses: 0, totalFlags: 0
    };

    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    const audio = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(freq, duration, type='sine') {
        const o = audio.createOscillator(); const g = audio.createGain();
        o.type = type; o.connect(g); g.connect(audio.destination);
        o.frequency.setValueAtTime(freq, audio.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + duration);
        o.start(); o.stop(audio.currentTime + duration);
    }

    function openModal(id) {
        if(id === 'stats-overlay') updateStatsUI();
        const el = document.getElementById(id);
        el.style.display = 'flex';
        setTimeout(() => el.classList.add('active'), 10);
    }

    function closeModal(id) {
        const el = document.getElementById(id);
        el.classList.remove('active');
        setTimeout(() => { el.style.display = 'none'; }, 300);
    }

    function initGame() {
        clearInterval(timerInt);
        mines = []; flags.clear(); revealed.clear();
        gameOver = false; time = 0; firstClick = true;
        
        document.getElementById('timer-val').innerText = '0';
        document.getElementById('flag-count').innerText = MINE_COUNT;
        document.getElementById('pc-legend').style.display = isTouch ? 'none' : 'block';
        document.querySelectorAll('.overlay').forEach(el => closeModal(el.id));
        document.getElementById('viewing-controls').style.display = 'none';
        document.getElementById('mobile-menu').style.display = 'none';
        
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for(let i=0; i<SIZE*SIZE; i++) {
            const t = document.createElement('div');
            t.className = 'tile';
            t.dataset.idx = i;
            // Combined handling for PC vs Mobile
            t.addEventListener('pointerdown', (e) => handleInput(e, i));
            t.oncontextmenu = (e) => e.preventDefault();
            grid.appendChild(t);
        }
        timerInt = setInterval(() => { time++; document.getElementById('timer-val').innerText = time; }, 1000);
    }

    function handleInput(e, i) {
        if(gameOver) return;
        
        // PC LOGIC: No menu
        if (e.pointerType === 'mouse') {
            if (e.button === 0) { // Left Click
                if (revealed.has(i)) chord(i); else dig(i);
            } else if (e.button === 2) { // Right Click
                toggleFlag(i);
            }
            return;
        }

        // MOBILE LOGIC: Show Menu
        e.preventDefault();
        activeTileIdx = i;
        const menu = document.getElementById('mobile-menu');
        const chordBtn = document.getElementById('chord-btn');
        chordBtn.style.display = revealed.has(i) ? 'flex' : 'none';
        
        menu.style.display = 'flex';
        menu.style.top = e.clientY + 'px';
        menu.style.left = e.clientX + 'px';
    }

    function handleAction(act) {
        if(act === 'dig') dig(activeTileIdx);
        if(act === 'flag') toggleFlag(activeTileIdx);
        if(act === 'chord') chord(activeTileIdx);
        document.getElementById('mobile-menu').style.display = 'none';
    }

    window.addEventListener('pointerdown', (e) => {
        if(!e.target.closest('#grid') && !e.target.closest('#mobile-menu')) {
            document.getElementById('mobile-menu').style.display = 'none';
        }
    });

    function generateMines(safeIdx) {
        const forbidden = new Set([safeIdx]);
        while(mines.length < MINE_COUNT) {
            let r = Math.floor(Math.random() * 100);
            if(!mines.includes(r) && !forbidden.has(r)) mines.push(r);
        }
    }

    function dig(i) {
        if(flags.has(i) || revealed.has(i) || gameOver) return;
        if(firstClick) { firstClick = false; generateMines(i); }
        if(mines.includes(i)) { endGame(false); return; }
        playSfx(600, 0.05);
        reveal(i);
        if(revealed.size === (100 - MINE_COUNT)) endGame(true);
    }

    function reveal(i) {
        if(revealed.has(i) || flags.has(i)) return;
        revealed.add(i);
        const t = document.querySelector(`[data-idx="${i}"]`);
        t.classList.add('revealed');
        const neighbors = getNeighbors(i);
        const mCount = neighbors.filter(n => mines.includes(n)).length;
        if(mCount > 0) {
            t.innerText = mCount; t.classList.add('n'+(mCount > 4 ? 4 : mCount));
        } else { neighbors.forEach(n => reveal(n)); }
    }

    function chord(i) {
        const neighbors = getNeighbors(i);
        const fCount = neighbors.filter(n => flags.has(n)).length;
        const mCount = neighbors.filter(n => mines.includes(n)).length;
        const t = document.querySelector(`[data-idx="${i}"]`);
        if(t.innerText !== "" && fCount === mCount) neighbors.forEach(n => dig(n));
    }

    function toggleFlag(i) {
        if(revealed.has(i) || gameOver) return;
        playSfx(400, 0.1);
        flags.has(i) ? flags.delete(i) : flags.add(i);
        document.querySelector(`[data-idx="${i}"]`).classList.toggle('flagged');
        document.getElementById('flag-count').innerText = MINE_COUNT - flags.size;
        stats.totalFlags++;
        save();
    }

    async function endGame(win) {
        gameOver = true; clearInterval(timerInt);
        document.getElementById('mobile-menu').style.display = 'none';
        playSfx(win ? 900 : 150, 0.6, win ? 'sine' : 'sawtooth');

        if(!win) {
            stats.loses++;
            const unrevealedMines = mines.filter(m => !flags.has(m));
            for(let j=0; j<unrevealedMines.length; j++) {
                const m = unrevealedMines[j];
                const t = document.querySelector(`[data-idx="${m}"]`);
                t.classList.add('revealed', 'mine-reveal');
                t.innerText = '💣';
                playSfx(200, 0.05, 'square');
                await new Promise(r => setTimeout(r, 150)); // Cinematic slow reveal
            }
        } else {
            stats.wins++;
            if(time < stats.best) stats.best = time;
        }

        save();
        
        // Strict 2 second wait after final bomb reveal
        setTimeout(() => {
            document.getElementById('res-title').innerText = win ? "🏆 VICTORY" : "💥 EXPLODED";
            document.getElementById('res-title').style.color = win ? "var(--correct)" : "var(--mine)";
            document.getElementById('res-details').innerHTML = `
                <div class="stat-row"><span>Time</span><span>${time}s</span></div>
                <div class="stat-row"><span>Tiles Cleared</span><span>${revealed.size}</span></div>
            `;
            openModal('summary-overlay');
        }, 2000);
    }

    function viewRound() {
        closeModal('summary-overlay');
        document.getElementById('viewing-controls').style.display = 'flex';
        // Cleanup: Remove all flag emojis, only show bombs
        document.querySelectorAll('.tile').forEach(t => {
            t.innerText = t.classList.contains('revealed') ? t.innerText : '';
            if(t.classList.contains('flagged')) {
                t.classList.remove('flagged');
            }
        });
        mines.forEach(m => {
            const t = document.querySelector(`[data-idx="${m}"]`);
            t.classList.add('revealed', 'mine-reveal');
            t.innerText = '💣';
        });
    }

    function updateStatsUI() {
        document.getElementById('lifetime-details').innerHTML = `
            <div class="stat-row"><span>Best Time</span><span>${stats.best === 999 ? '--' : stats.best + 's'}</span></div>
            <div class="stat-row"><span>Wins</span><span>${stats.wins}</span></div>
            <div class="stat-row"><span>Losses</span><span>${stats.loses}</span></div>
        `;
    }

    function getNeighbors(i) {
        const n = [], r = Math.floor(i/SIZE), c = i%SIZE;
        for(let x=-1; x<=1; x++) {
            for(let y=-1; y<=1; y++) {
                if(x===0 && y===0) continue;
                if(r+x>=0 && r+x<SIZE && c+y>=0 && c+y<SIZE) n.push((r+x)*SIZE + (c+y));
            }
        }
        return n;
    }

    function save() { localStorage.setItem('ms_ultimate_stats', JSON.stringify(stats)); }

    initGame();
</script>
</body>
</html>
