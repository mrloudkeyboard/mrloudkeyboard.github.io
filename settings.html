<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic | Settings</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"
    />
    <style>
      :root {
        --primary: #7d5fff;
        --bg: #050508;
        --panel-bg: rgba(20, 20, 30, 0.95);
        --sidebar-w: 260px;
        --error: #ff4d4d;
        --card-bg: rgba(255, 255, 255, 0.03);
      }

      body {
        margin: 0;
        background: var(--bg);
        color: white;
        font-family: "Inter", sans-serif;
        overflow: hidden;
        display: flex;
        width: 100vw;
        height: 100vh;
      }

      /* --- Sidebar --- */
      #sidebar {
        width: var(--sidebar-w);
        height: 100vh;
        background: rgba(10, 10, 15, 0.98);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
        z-index: 2000;
        flex-shrink: 0;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
          margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
        visibility: visible;
      }
      .logo-area {
        font-weight: 600;
        font-size: 1.2rem;
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 10px;
      }
      .sidebar-divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin: 10px 0 20px 0;
        border: none;
      }
      #nav-links-container {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
      }
      .nav-item {
        padding: 12px 16px;
        border-radius: 10px;
        color: #888;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;
        text-decoration: none;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.05);
        color: white;
      }
      .nav-item.active {
        background: var(--primary);
        color: white;
      }
      .nav-item.loading {
        background: rgba(125, 95, 255, 0.2);
        color: var(--primary);
        cursor: wait;
      }

      /* --- Sidebar States --- */
      .sidebar-hidden #sidebar {
        transform: translateX(-100%);
        margin-left: calc(var(--sidebar-w) * -1);
        visibility: hidden;
      }
      .sidebar-hidden #menu-toggle {
        display: block;
      }

      /* --- Main Wrapper --- */
      #main-wrapper {
        flex: 1;
        height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow-x: hidden;
        overflow-y: auto;
      }
      #main-content {
        max-width: 800px;
        margin: 100px auto;
        padding: 20px;
        width: 100%;
        box-sizing: border-box;
      }

      /* --- Profile UI --- */
      .nav-header {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        z-index: 100;
      }
      #pfp-btn {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: 600;
        cursor: pointer;
        background-size: cover;
        background-position: center;
        transition: 0.2s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }
      .profile-panel {
        background: var(--panel-bg);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 20px;
        width: 220px;
        opacity: 0;
        transform: translateX(20px) scale(0.95);
        pointer-events: none;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }
      .profile-panel.active {
        opacity: 1;
        transform: translateX(0) scale(1);
        pointer-events: all;
      }
      .user-info h4 {
        margin: 0;
        font-size: 1rem;
      }
      .user-info p {
        margin: 4px 0 0;
        font-size: 0.75rem;
        color: #888;
      }
      .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin: 15px 0;
        border: none;
        width: 100%;
      }

      /* --- Settings Cards --- */
      .settings-card {
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 20px;
      }
      .settings-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .label {
        color: #888;
        font-size: 0.9rem;
      }
      .value {
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #settings-pfp-preview {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid var(--primary);
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 15px;
      }

      /* --- Buttons --- */
      button,
      .logout-btn-red {
        padding: 10px 18px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: 0.2s;
        font-family: inherit;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }
      .logout-btn-red {
        background: var(--error);
        color: white;
        width: 100%;
        text-align: center;
        font-size: 0.85rem;
        display: block;
        box-sizing: border-box;
      }
      .logout-btn-red:hover {
        filter: brightness(1.2);
      }

      #menu-toggle {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 1100;
        cursor: pointer;
        background: var(--panel-bg);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 10px;
        border-radius: 8px;
        display: none;
      }
      .bar {
        width: 20px;
        height: 2px;
        background: white;
        margin: 4px 0;
      }
      #close-sidebar {
        cursor: pointer;
        font-size: 11px;
        color: #555;
      }

      /* --- Modals --- */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 3000;
        backdrop-filter: blur(10px);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      .modal-content {
        background: #0f0f1a;
        padding: 30px;
        border-radius: 20px;
        border: 1px solid var(--primary);
        width: 100%;
        max-width: 400px;
        text-align: center;
        transform: scale(0.8);
        transition: 0.3s;
      }
      .modal-overlay.show {
        display: flex;
        opacity: 1;
      }
      .modal-overlay.show .modal-content {
        transform: scale(1);
      }
      input[type="text"] {
        width: 100%;
        padding: 12px;
        margin: 15px 0;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: white;
        outline: none;
        box-sizing: border-box;
      }
      #cropper-container {
        width: 100%;
        height: 250px;
        background: #000;
        margin-bottom: 15px;
      }
      #large-pfp-view {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        margin: 0 auto 20px;
        background-size: cover;
        background-position: center;
        border: 3px solid var(--primary);
      }

      /* --- Mobile --- */
      @media (max-width: 768px) {
        #sidebar {
          position: fixed;
          transform: translateX(-100%);
          visibility: hidden;
        }
        #sidebar.mobile-active {
          transform: translateX(0);
          visibility: visible;
        }
        #menu-toggle {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div id="menu-toggle">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <nav id="sidebar">
      <div class="logo-area">
        <span>COSMIC</span><span id="close-sidebar">✕ CLOSE</span>
      </div>
      <hr class="sidebar-divider" />
      <div id="nav-links-container"></div>
      <button
        class="logout-btn-red"
        id="sidebar-logout"
        style="margin-top: auto"
      >
        Logout
      </button>
    </nav>

    <div id="main-wrapper">
      <div class="nav-header">
        <div id="profile-panel" class="profile-panel">
          <div class="user-info">
            <h4 id="panel-username">User</h4>
            <p id="panel-email">email@example.com</p>
          </div>
          <hr class="divider" />
          <div class="logout-btn-red" id="logout-trigger">Logout</div>
        </div>
        <div id="pfp-btn">?</div>
      </div>

      <div id="main-content">
        <h1>Settings</h1>

        <div class="settings-card">
          <h3>Account Details</h3>
          <div class="settings-row">
            <span class="label">Username</span>
            <span class="value">
              <span id="display-username">---</span>
              <button
                class="btn-secondary"
                style="padding: 4px 8px; font-size: 11px"
                onclick="openModal('username-modal')"
              >
                Change
              </button>
            </span>
          </div>
          <div class="settings-row">
            <span class="label">Email</span>
            <span id="display-email" class="value">---</span>
          </div>
          <div class="settings-row">
            <span class="label">Member Since</span>
            <span id="display-date" class="value">---</span>
          </div>
        </div>

        <div class="settings-card">
          <h3>Profile Picture</h3>
          <div id="settings-pfp-preview">?</div>
          <input type="file" id="pfp-input" hidden accept="image/*" />
          <div style="display: flex; gap: 10px">
            <button
              class="btn-primary"
              onclick="document.getElementById('pfp-input').click()"
            >
              Upload Photo
            </button>
            <button class="btn-secondary" id="view-large-btn">View PFP</button>
          </div>
        </div>

        <div class="settings-card">
          <h3>Security</h3>
          <button class="btn-secondary" id="reset-pass-btn">
            Email Password Reset
          </button>
        </div>
      </div>
    </div>

    <div id="username-modal" class="modal-overlay">
      <div class="modal-content">
        <h3>Change Username</h3>
        <input type="text" id="new-username-input" placeholder="New username" />
        <div style="display: flex; gap: 10px; justify-content: center">
          <button class="btn-primary" id="save-username-confirm">Save</button>
          <button class="btn-secondary" onclick="closeModals()">Cancel</button>
        </div>
      </div>
    </div>

    <div id="pfp-modal" class="modal-overlay">
      <div class="modal-content">
        <h3>Adjust Photo</h3>
        <div id="cropper-container"><img id="cropper-image" src="" /></div>
        <button class="btn-primary" id="save-pfp-confirm">Save Avatar</button>
        <button class="btn-secondary" onclick="closeModals()">Cancel</button>
      </div>
    </div>

    <div id="view-pfp-modal" class="modal-overlay">
      <div class="modal-content">
        <h3>Profile Picture</h3>
        <div id="large-pfp-view"></div>
        <button class="btn-secondary" onclick="closeModals()">Close</button>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
        updateProfile,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAhHtBQUGzYS5sOSh4thghEeGimj9JN5cI",
        authDomain: "cosmic-cfc13.firebaseapp.com",
        projectId: "cosmic-cfc13",
        storageBucket: "cosmic-cfc13.firebasestorage.app",
        appId: "1:107175390315:web:c2b085ffb7904ce6a5552e",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      let cropper;
      let currentPfpBase64 = null;

      onAuthStateChanged(auth, (user) => {
        if (user) {
          const name = user.displayName || user.email.split("@")[0];
          document.getElementById("display-username").innerText = name;
          document.getElementById("panel-username").innerText = name;
          document.getElementById("display-email").innerText = user.email;
          document.getElementById("panel-email").innerText = user.email;
          document.getElementById("display-date").innerText = new Date(
            user.metadata.creationTime
          ).toLocaleDateString();

          onSnapshot(doc(db, "pfps", user.uid), (snap) => {
            const pfpBtn = document.getElementById("pfp-btn");
            const pfpPrev = document.getElementById("settings-pfp-preview");
            const largeView = document.getElementById("large-pfp-view");

            if (snap.exists() && snap.data().base64) {
              currentPfpBase64 = snap.data().base64;
              pfpBtn.style.backgroundImage = `url(${currentPfpBase64})`;
              pfpPrev.style.backgroundImage = `url(${currentPfpBase64})`;
              largeView.style.backgroundImage = `url(${currentPfpBase64})`;
              pfpBtn.innerText = "";
              pfpPrev.innerText = "";
            } else {
              const char = name.charAt(0).toUpperCase();
              pfpBtn.innerText = char;
              pfpPrev.innerText = char;
              pfpBtn.style.backgroundColor = "#7d5fff";
              pfpBtn.style.backgroundImage = "none";
              pfpPrev.style.backgroundImage = "none";
            }
          });
        } else {
          window.location.href = "/index.html";
        }
      });

      // --- Sidebar Logic ---
      const menuBtn = document.getElementById("menu-toggle");
      const closeBtn = document.getElementById("close-sidebar");
      const sidebar = document.getElementById("sidebar");

      menuBtn.onclick = () => {
        document.body.classList.remove("sidebar-hidden");
        sidebar.classList.add("mobile-active");
      };
      closeBtn.onclick = () => {
        document.body.classList.add("sidebar-hidden");
        sidebar.classList.remove("mobile-active");
      };

      // --- DYNAMIC TABS LOGIC ---
      function handleTabClick(el, url) {
        document
          .querySelectorAll(".nav-item")
          .forEach((i) => i.classList.remove("active"));
        el.classList.add("active");
        el.classList.add("loading");
        setTimeout(() => {
          window.location.href = "/" + url;
        }, 400);
      }

      async function loadTabs() {
        const container = document.getElementById("nav-links-container");
        const currentPage =
          window.location.pathname.split("/").pop() || "settings.html";

        try {
          const res = await fetch("/tabs.txt");
          const text = await res.text();
          const blocks = text.trim().split(/\n\s*\n/);

          blocks.forEach((block) => {
            let title = "",
              url = "";
            block.split("\n").forEach((line) => {
              if (line.includes("Title =")) title = line.split("=")[1].trim();
              if (line.includes("URL =")) url = line.split("=")[1].trim();
            });

            if (title && url) {
              const div = document.createElement("div");
              div.className = "nav-item";
              div.innerText = title;
              if (url === currentPage) div.classList.add("active");
              div.onclick = () => handleTabClick(div, url);
              container.appendChild(div);
            }
          });
        } catch (e) {
          console.error("Error loading tabs:", e);
        }
      }
      loadTabs();

      // --- Modal Logic ---
      window.openModal = (id) => {
        const m = document.getElementById(id);
        m.style.display = "flex";
        setTimeout(() => m.classList.add("show"), 10);
      };
      window.closeModals = () => {
        document.querySelectorAll(".modal-overlay").forEach((m) => {
          m.classList.remove("show");
          setTimeout(() => (m.style.display = "none"), 300);
        });
        if (cropper) cropper.destroy();
      };

      document.getElementById("view-large-btn").onclick = () =>
        openModal("view-pfp-modal");

      document.getElementById("pfp-input").onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            document.getElementById("cropper-image").src = ev.target.result;
            openModal("pfp-modal");
            setTimeout(() => {
              cropper = new Cropper(document.getElementById("cropper-image"), {
                aspectRatio: 1,
                viewMode: 1,
              });
            }, 350);
          };
          reader.readAsDataURL(file);
        }
      };

      document.getElementById("save-pfp-confirm").onclick = async () => {
        const btn = document.getElementById("save-pfp-confirm");
        btn.innerText = "Saving...";
        const base64 = cropper
          .getCroppedCanvas({ width: 200, height: 200 })
          .toDataURL("image/jpeg", 0.7);
        try {
          await setDoc(doc(db, "pfps", auth.currentUser.uid), {
            base64: base64,
          });
          closeModals();
        } catch (e) {
          alert(e.message);
        }
        btn.innerText = "Save Avatar";
      };

      document.getElementById("save-username-confirm").onclick = async () => {
        const val = document.getElementById("new-username-input").value.trim();
        if (val) {
          await updateProfile(auth.currentUser, { displayName: val });
          location.reload();
        }
      };

      document.getElementById("pfp-btn").onclick = (e) => {
        e.stopPropagation();
        document.getElementById("profile-panel").classList.toggle("active");
      };
      window.onclick = () =>
        document.getElementById("profile-panel").classList.remove("active");

      const doLogout = () =>
        signOut(auth).then(() => (window.location.href = "/index.html"));
      document.getElementById("logout-trigger").onclick = doLogout;
      document.getElementById("sidebar-logout").onclick = doLogout;

      document.getElementById("reset-pass-btn").onclick = () =>
        sendPasswordResetEmail(auth, auth.currentUser.email).then(() =>
          alert("Email sent.")
        );
    </script>
  </body>
</html>
